apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/erickfranca/infra-repo.git
    targetRevision: main
    path: .
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
